tests:
- test_id: CK001
  input:
    tables:
    - csv: ck001_in.csv
      type: file
  execution:
    shell_program: mock_linux/opt/migsys/業務A/sh/ck001.sh
    shell_group: 業務A
  outputs:
  - type: file
    expected: ck001_zandaka.csv
    file: ck001_zandaka.csv
    tobe_dir: tobe/ck001_alt
    compare:
      mode: record
      key: KOKYAKU_ID
      encoding: shift_jis
      mask: KOSHIN_NICHIJI
