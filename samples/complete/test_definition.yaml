tests:
- test_id: CK001
  test_name: 顧客残高マスタ日次更新
  input:
    tables:
    - csv: ck001_in.csv
      type: file
  execution:
    shell_program: mock_linux/opt/migsys/業務A/sh/ck001.sh
    shell_group: 業務A
  outputs:
  - type: file
    expected: ck001_zandaka.csv
    file: ck001_zandaka.csv
    name: 顧客残高
    compare:
      mode: record
      key: KOKYAKU_ID
      encoding: shift_jis
      mask: KOSHIN_NICHIJI
      normalize: SHITEN_CD:zeropad:4;ZANDAKA:num:2;KISAN_YMD:date;BIKO:nullblank
      has_header: true
- test_id: CK002
  test_name: 取引明細集計(多重入力)
  input:
    tables:
    - csv: ck002_in1.csv
      type: file
    - csv: ck002_in2.csv
      type: file
  execution:
    shell_program: mock_linux/opt/migsys/業務A/sh/ck002.sh
    shell_group: 業務A
  outputs:
  - type: file
    expected: ck002_shukei.csv
    file: ck002_shukei.csv
    name: 集計
    compare:
      mode: record
      key: TX_ID
      encoding: shift_jis
      normalize: KINGAKU:num:0
      has_header: true
