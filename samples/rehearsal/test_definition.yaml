tests:
- test_id: CK001
  test_name: 顧客残高マスタ日次更新
  input:
    tables:
    - csv: torihiki_meisai.csv
      type: file
      dest_dir: tobe/input
      src_dir: asis/input
  execution:
    shell_program: batch/kokyaku_zandaka_update.py
  outputs:
  - type: file
    expected: kokyaku_zandaka_master.csv
    file: kokyaku_zandaka_master.csv
    name: 顧客残高マスタ
    expected_dir: asis/output
    tobe_dir: tobe/output
    compare:
      mode: record
      key: KOKYAKU_ID
      encoding: shift_jis
      mask: KOSHIN_NICHIJI
      normalize: SHITEN_CD:zeropad:4;ZANDAKA:num:2;KISAN_YMD:date;BIKO:nullblank
      has_header: true
