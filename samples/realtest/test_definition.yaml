tests:
- test_id: CK001
  test_name: 顧客残高マスタ日次更新
  input:
    tables:
    - csv: ck001_in.csv
      type: file
      dest_dir: tobe/in
      src_dir: asis/input
  execution:
    shell_program: batch/run_batch.py
  outputs:
  - type: file
    expected: ck001_zandaka.csv
    file: ck001_zandaka.csv
    name: 顧客残高マスタ
    expected_dir: asis/output
    tobe_dir: tobe/output
    compare:
      mode: record
      key: KOKYAKU_ID
      encoding: shift_jis
      mask: KOSHIN_NICHIJI
      normalize: SHITEN_CD:zeropad:4;ZANDAKA:num:2;KISAN_YMD:date;BIKO:nullblank
      has_header: true
