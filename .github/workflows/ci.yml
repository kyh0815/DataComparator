name: CI

# 목적: 매 푸시·PR마다 Linux·Windows 양 OS에서 테스트를 자동 실행해
# "Windows에서도 동작"을 증명(D-060). 회귀는 양 OS에서 차단된다.
# DB 미요(기본 스위트는 DB-free, DB 통합은 RUN_DB_TESTS 게이트 뒤 — CI에선 자동 skip).

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests (DB-free)
        run: python -m pytest -rA --junitxml=junit.xml
      - name: Annotate test failures
        if: failure()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: junit.xml
          detailed_summary: true
          include_passed: false
          annotate_only: true
