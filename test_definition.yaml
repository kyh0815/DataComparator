    success_criteria: { pass_condition: all_exact_match }

  # --- 야간 배치 시뮬 (파일 입력) : 006~010, NG/ERROR 집중 ---
  - test_id: "006"
    test_name: "야간배치 - 일일명세 (파일입력/파일출력, 정상)"
    input:   { type: file, dest_dir: ./out/tobe_input/, csv: 006.csv }
    execution: { shell_program: stub_batch/run_batch_file.py, timeout: 60 }
    output:  { type: file, file: 006.csv }
    expected_output_csv: 006.csv
    comparison_rules: { type: byte_exact }
    success_criteria: { pass_condition: all_exact_match }

  - test_id: "007"
    test_name: "야간배치 - 일일명세 (NG: 한 줄 데이터 차이)"
