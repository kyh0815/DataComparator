<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>現新比較 自動検証ツール</title>
<!--
  Phase 7 (T7-3) 経量化UI: 버튼 1개 → 自動実行(Shell 1~1000) → リアルタイム監視 → 結果.
  검증 정의의 정본은 config가 가리키는 정의 파일(DEFINITION_SPEC) — 화면엔 입력타입·테이블 선택칸이 없다.
  外部依存 0(시스템 폰트만, CDN·빌드 없음) — 온프레미스 제약 유지. 서버 진입점: src/gui/web.py.
  진행은 이벤트 구동(shell_start/step/shell_done/summary/warning/error), 출력 단위 집계(T7-2).
-->
<style>
  :root {
    --ok:#1a7f37;   --ok-bg:#e7f4ec;   --ok-bd:#bfe2c9;
    --ng:#c5303a;   --ng-bg:#fcecec;   --ng-bd:#f0c2c2;
    --warn:#9a6700; --warn-bg:#fdf4e1; --warn-bd:#efd99b;
    --accent:#15589e; --accent-2:#1d6fc4; --accent-bg:#eaf2fb; --accent-bd:#c4ddf6;
    --bg:#eef1f4; --panel:#ffffff; --line:#e3e8ee; --line-2:#d4dbe3;
    --ink:#1c2530; --ink-2:#3c4757; --muted:#6a7686; --muted-2:#8c97a5;
    --field-bg:#ffffff; --radius:10px; --radius-sm:7px;
    --shadow:0 1px 2px rgba(20,32,52,.04), 0 2px 6px rgba(20,32,52,.05);
    --shadow-pop:0 6px 20px rgba(20,32,52,.10);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Roboto Mono",monospace;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,"Helvetica Neue",Arial,sans-serif;
    margin:0; background:var(--bg); color:var(--ink);
    line-height:1.55; font-size:14px;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-feature-settings:"palt" 1;
  }

  /* ---------- header ---------- */
  header { background:var(--panel); border-bottom:1px solid var(--line); box-shadow:0 1px 0 rgba(20,32,52,.02); position:sticky; top:0; z-index:20; }
  .header-in { max-width:960px; margin:0 auto; padding:16px 24px; display:flex; align-items:center; gap:14px; }
  .header-in .bar { width:4px; height:34px; background:var(--accent); border-radius:3px; }
  .header-in .ttl h1 { font-size:17px; margin:0; font-weight:700; letter-spacing:.2px; color:var(--ink); }
  .header-in .ttl p { margin:2px 0 0; font-size:12.5px; color:var(--muted); letter-spacing:.1px; }

  /* ---------- layout ---------- */
  main { max-width:960px; margin:0 auto; padding:24px 24px 64px; }

  /* ---------- panel / sections ---------- */
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
  .panel-head { display:flex; align-items:center; gap:11px; padding:15px 20px; border-bottom:1px solid var(--line); background:#fbfcfd; }
  .panel-head h2 { font-size:14px; margin:0; font-weight:700; color:var(--ink); letter-spacing:.2px; }
  .panel-head .sub { font-size:12px; color:var(--muted); margin-left:auto; font-weight:500; }
  .panel-body { padding:20px; }

  /* settings as <details> */
  details.settings { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; }
  details.settings > summary {
    list-style:none; cursor:pointer; padding:14px 20px; display:flex; align-items:center; gap:11px;
    font-size:14px; font-weight:700; color:var(--ink); background:#fbfcfd; border-bottom:1px solid transparent;
  }
  details[open].settings > summary { border-bottom-color:var(--line); }
  details.settings > summary::-webkit-details-marker { display:none; }
  details.settings > summary .chev { margin-left:auto; color:var(--muted-2); font-size:12px; transition:transform .15s; }
  details[open].settings > summary .chev { transform:rotate(90deg); }
  details.settings > summary .sub { font-weight:500; font-size:12px; color:var(--muted); }

  /* ---------- form ---------- */
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:15px 16px; }
  .grid.cols2 { grid-template-columns:1fr 1fr; }
  .field label.lab { font-size:11.5px; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; letter-spacing:.2px; }
  .field label.lab .opt { color:var(--muted-2); font-weight:500; }
  .field input[type=text], .field input[type=number] {
    width:100%; padding:9px 11px; border:1px solid var(--line-2); border-radius:var(--radius-sm);
    font-size:13.5px; background:var(--field-bg); color:var(--ink); transition:border-color .14s, box-shadow .14s;
    font-variant-numeric:tabular-nums;
  }
  .field input::placeholder { color:#aeb7c2; }
  .field input:focus { outline:none; border-color:var(--accent-2); box-shadow:0 0 0 3px rgba(29,111,196,.16); }
  .field .hint { font-size:11px; color:var(--muted-2); margin-top:5px; }

  .actions { display:flex; gap:11px; align-items:center; flex-wrap:wrap; margin-top:18px; }
  .actions .grow { flex:1; }
  button.run, button.ghost {
    border-radius:var(--radius-sm); padding:10px 18px; font-size:13.5px; font-weight:600;
    cursor:pointer; letter-spacing:.2px; transition:filter .14s,background .14s,box-shadow .14s,border-color .14s;
    display:inline-flex; align-items:center; gap:8px; font-family:inherit;
  }
  button.run { background:var(--accent); color:#fff; border:1px solid var(--accent); box-shadow:0 1px 2px rgba(21,88,158,.3); }
  button.run:hover:not(:disabled) { background:var(--accent-2); }
  button.run:disabled { background:#a9c3e0; border-color:#a9c3e0; box-shadow:none; cursor:default; }
  button.run.big { padding:12px 26px; font-size:14.5px; }
  button.ghost { background:#fff; color:var(--accent); border:1px solid var(--accent-bd); }
  button.ghost:hover:not(:disabled) { background:var(--accent-bg); border-color:var(--accent-2); }
  button.ghost.busy { color:var(--muted); border-color:var(--line-2); }
  .chk { display:inline-flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-2); cursor:pointer; user-select:none; }
  .chk input { width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }

  /* ---------- callouts ---------- */
  .callout { font-size:12.5px; line-height:1.65; border-radius:var(--radius-sm); padding:12px 14px; margin-top:14px; border:1px solid; display:flex; gap:11px; align-items:flex-start; }
  .callout.info { background:var(--accent-bg); border-color:var(--accent-bd); color:#234e7d; }
  .callout.warn { background:var(--warn-bg); border-color:var(--warn-bd); color:#6e4a00; }
  .callout.sec  { background:#f4f6f8; border-color:var(--line-2); color:var(--ink-2); }
  .callout b { color:inherit; font-weight:700; }
  .callout code { font-family:var(--mono); font-size:11.5px; background:rgba(20,32,52,.07); padding:1px 5px; border-radius:4px; }

  /* connection test checklist + toast */
  .checks { margin-top:16px; display:none; }
  .checks.show { display:block; }
  .checks .ck-title { font-size:11.5px; font-weight:700; color:var(--muted); letter-spacing:.4px; text-transform:uppercase; margin-bottom:8px; }
  .checks .c { display:flex; align-items:center; gap:10px; padding:8px 11px; font-size:13px; border:1px solid var(--line); border-radius:var(--radius-sm); margin-bottom:6px; background:#fbfcfd; }
  .checks .c .mk { width:20px; height:20px; border-radius:50%; flex-shrink:0; font-weight:700; font-size:12px; display:inline-flex; align-items:center; justify-content:center; color:#fff; }
  .checks .c.ok .mk { background:var(--ok); } .checks .c.bad .mk { background:var(--ng); } .checks .c.pend .mk { background:var(--muted-2); }
  .checks .c .nm { font-weight:600; color:var(--ink-2); }
  .checks .c .dt { color:var(--muted); font-family:var(--mono); font-size:12px; margin-left:auto; }
  .checks .c.pend { color:var(--muted); }
  .toast { font-size:12.5px; margin-top:13px; padding:10px 13px; border-radius:var(--radius-sm); display:none; font-weight:600; border:1px solid; }
  .toast.ok { background:var(--ok-bg); color:var(--ok); border-color:var(--ok-bd); }
  .toast.bad { background:var(--ng-bg); color:var(--ng); border-color:var(--ng-bd); }

  /* ---------- definition 警告（読み込めない時のみ） ---------- */
  .def-preview { border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 15px; background:#fbfcfd; margin-bottom:16px; }
  .def-head { font-weight:700; color:var(--accent); margin-bottom:9px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .def-note { color:var(--muted); font-weight:500; margin-top:9px; font-size:11.5px; }
  .def-preview.bad { background:var(--warn-bg); border-color:var(--warn-bd); }
  .def-preview.bad .def-head { color:#6e4a00; }

  /* ---------- banners ---------- */
  .banner { display:none; padding:13px 16px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; margin-bottom:14px; border:1px solid; align-items:flex-start; gap:10px; }
  .banner.show { display:flex; }
  .banner.err { background:var(--ng-bg); color:var(--ng); border-color:var(--ng-bd); }
  .banner.warn { background:var(--warn-bg); color:#6e4a00; border-color:var(--warn-bd); }

  /* ---------- summary ---------- */
  #summary { display:none; }
  #summary.show { display:block; }
  .summary-cards { display:grid; grid-template-columns:repeat(5,1fr); gap:11px; }
  .scard { border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 14px 13px; background:#fbfcfd; position:relative; overflow:hidden; cursor:pointer; transition:box-shadow .14s, border-color .14s, transform .04s; user-select:none; }
  .scard:hover:not(.disabled) { border-color:var(--line-2); box-shadow:var(--shadow-pop); }
  .scard:active:not(.disabled) { transform:translateY(1px); }
  .scard.active { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-bd); }
  .scard.disabled { cursor:default; opacity:.5; }
  .filter-hint { font-size:12px; color:var(--muted); margin-top:10px; min-height:15px; }
  .filter-hint b { color:var(--ink-2); font-weight:700; }
  .filter-hint a { color:var(--accent); cursor:pointer; text-decoration:none; margin-left:8px; }
  .filter-hint a:hover { text-decoration:underline; }
  .scard::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--muted-2); }
  .scard.ok::before { background:var(--ok); } .scard.ng::before { background:var(--ng); }
  .scard.err::before { background:var(--warn); } .scard.miss::before { background:var(--muted-2); }
  .scard.total::before { background:var(--accent); }
  .scard .n { font-size:27px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-.5px; }
  .scard.ok .n { color:var(--ok); } .scard.ng .n { color:var(--ng); } .scard.err .n { color:var(--warn); }
  .scard.total .n { color:var(--ink); } .scard.miss .n { color:var(--ink-2); }
  .scard .l { font-size:11.5px; color:var(--muted); margin-top:7px; font-weight:600; letter-spacing:.3px; }
  .summary-meta { display:flex; align-items:center; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--line); font-size:12.5px; color:var(--muted); }
  .summary-meta .el { font-weight:600; color:var(--ink-2); font-variant-numeric:tabular-nums; }
  .summary-meta .rep { margin-left:auto; }
  .summary-meta a { color:var(--accent); font-weight:600; text-decoration:none; font-family:var(--mono); font-size:12px; }
  .summary-meta a:hover { text-decoration:underline; }

  /* ---------- results / shell rows ---------- */
  #results-wrap { display:none; }
  #results-wrap.show { display:block; }
  .results-head { display:flex; align-items:center; gap:10px; margin:22px 2px 12px; }
  .results-head h3 { font-size:13px; margin:0; font-weight:700; color:var(--ink-2); letter-spacing:.3px; }
  .results-head .live { font-size:11px; color:var(--accent); font-weight:700; display:none; align-items:center; gap:6px; }
  .results-head .live.show { display:inline-flex; }
  .results-head .live .pulse { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .shell { border:1px solid var(--line); border-radius:var(--radius-sm); margin-bottom:8px; background:var(--panel); box-shadow:var(--shadow); transition:border-color .2s, box-shadow .2s; animation:rise .26s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .shell.running { border-color:var(--accent-bd); box-shadow:0 0 0 3px rgba(29,111,196,.08); }
  .shell-head { display:flex; align-items:center; gap:12px; padding:12px 15px; }
  .shell-head .ix { font-family:var(--mono); font-size:11.5px; color:var(--muted-2); font-weight:600; min-width:46px; }
  .shell-head .sid { font-family:var(--mono); font-size:14px; font-weight:700; color:var(--ink); background:#f1f4f7; border:1px solid var(--line); border-radius:6px; padding:2px 9px; letter-spacing:.5px; }
  .shell-head .badge { margin-left:auto; }
  .badge { font-size:11px; font-weight:700; padding:3px 11px; border-radius:999px; letter-spacing:.4px; border:1px solid; display:inline-flex; align-items:center; gap:6px; text-transform:uppercase; }
  .badge .bd { width:7px; height:7px; border-radius:50%; }
  .badge.b-OK { background:var(--ok-bg); color:var(--ok); border-color:var(--ok-bd); } .badge.b-OK .bd{ background:var(--ok); }
  .badge.b-NG { background:var(--ng-bg); color:var(--ng); border-color:var(--ng-bd); } .badge.b-NG .bd{ background:var(--ng); }
  .badge.b-ERROR, .badge.b-MISSING_TOBE, .badge.b-MISSING_ASIS { background:var(--warn-bg); color:#7a5200; border-color:var(--warn-bd); }
  .badge.b-ERROR .bd, .badge.b-MISSING_TOBE .bd, .badge.b-MISSING_ASIS .bd { background:var(--warn); }
  .badge.b-RUN { background:#eef1f4; color:var(--muted); border-color:var(--line-2); }
  .badge.b-RUN .bd { background:var(--muted-2); animation:pulse 1s infinite; }

  /* step progress */
  .steps { display:flex; align-items:center; gap:0; padding:0 15px 13px; flex-wrap:wrap; }
  .step { display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--muted-2); font-weight:600; }
  .step .sdot { width:16px; height:16px; border-radius:50%; border:1.5px solid var(--line-2); background:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:10px; color:transparent; flex-shrink:0; transition:all .2s; }
  .step.active { color:var(--accent); }
  .step.active .sdot { border-color:var(--accent); background:var(--accent-bg); }
  .step.active .sdot::after { content:""; width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite; }
  .step.done { color:var(--ok); }
  .step.done .sdot { border-color:var(--ok); background:var(--ok); color:#fff; }
  .step.done .sdot::after { content:"✓"; }
  .step.err { color:var(--warn); }
  .step.err .sdot { border-color:var(--warn); background:var(--warn); color:#fff; }
  .step.err .sdot::after { content:"!"; }
  .step .res { font-family:var(--mono); font-size:11px; }
  .connector { flex:1; min-width:22px; height:1.5px; background:var(--line-2); margin:0 9px; border-radius:1px; transition:background .2s; }
  .connector.fill { background:var(--ok); }

  /* diff detail */
  .detail { display:none; }
  .detail.show { display:block; }
  .detail .dline { margin-bottom:10px; }
  .detail .dline:last-child { margin-bottom:0; }
  .detail .ln { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:5px; font-family:var(--mono); letter-spacing:.3px; }
  .detail .row { font-family:var(--mono); font-size:12.5px; line-height:1.5; padding:7px 11px; border-radius:6px; display:flex; gap:10px; align-items:baseline; white-space:pre-wrap; word-break:break-all; }
  .detail .row .tag { font-weight:700; flex-shrink:0; width:46px; font-size:11px; letter-spacing:.3px; }
  .detail .row.asis { background:#fdf3f3; border:1px solid var(--ng-bd); border-bottom:0; border-radius:6px 6px 0 0; }
  .detail .row.asis .tag { color:var(--ng); }
  .detail .row.tobe { background:#f1f9f3; border:1px solid var(--ok-bd); border-radius:0 0 6px 6px; }
  .detail .row.tobe .tag { color:var(--ok); }
  .detail mark { padding:1px 0; border-radius:2px; font-weight:700; }
  .detail mark.a { background:#ffc9c9; color:#7d1620; box-shadow:0 0 0 1px #ffb3b3; }
  .detail mark.b { background:#a3e9b4; color:#0a5224; box-shadow:0 0 0 1px #86dd9b; }
  .detail .errbox { font-family:var(--mono); font-size:12.5px; background:var(--warn-bg); border:1px solid var(--warn-bd); border-radius:6px; padding:9px 12px; color:#6e4a00; white-space:pre-wrap; word-break:break-all; }
  .detail .more { font-size:11.5px; color:var(--muted); margin-top:8px; font-weight:600; }

  /* 출력별 결과 블록(T7-2: 셸 안 다중 출력) */
  .outs { margin:0 15px 13px; display:flex; flex-direction:column; gap:7px; }
  .outrow { border:1px solid var(--line); border-radius:7px; padding:8px 11px; background:#fbfcfd; }
  .outhead { display:flex; align-items:center; gap:9px; font-size:12px; }
  .outhead .outname { font-family:var(--mono); font-weight:700; color:var(--ink); }
  .outrow .detail { margin:7px 0 0; }

  .empty { text-align:center; padding:34px 20px; color:var(--muted-2); font-size:13px; }
</style>
</head>
<body>
<header>
  <div class="header-in">
    <span class="bar"></span>
    <div class="ttl">
      <h1>現新比較 自動検証ツール</h1>
    </div>
    <span style="margin-left:auto;font-size:13px;font-weight:600"><a href="/define" style="color:var(--accent);text-decoration:none;border:1px solid var(--accent-bd);padding:6px 12px;border-radius:7px">定義作成 →</a></span>
  </div>
</header>

<main>
  <!-- ① 設定 / 接続 -->
  <details class="settings" id="settings" {% if settings_open %}open{% endif %}>
    <summary>
      設定 / 接続
      <span class="chev">▶</span>
    </summary>
    <div class="panel-body">
      <div class="grid">
        <div class="field"><label class="lab">ホスト (host)</label><input type="text" id="c-host" value="{{ conn.host }}"></div>
        <div class="field"><label class="lab">ポート (port)</label><input type="number" id="c-port" value="{{ conn.port }}"></div>
        <div class="field"><label class="lab">データベース (dbname)</label><input type="text" id="c-dbname" value="{{ conn.dbname }}"></div>
        <div class="field"><label class="lab">ユーザー (user)</label><input type="text" id="c-user" value="{{ conn.user }}"></div>
        <div class="field"><label class="lab">パスワード環境変数 <span class="opt">(password_env)</span></label><input type="text" id="c-pwenv" value="{{ conn.password_env }}"></div>
        <div class="field"><label class="lab">エンコーディング</label><input type="text" id="c-encoding" value="{{ conn.encoding }}"></div>
      </div>
      <div class="callout warn">
        <div>検証専用 DB／最小権限アカウントで実行してください（入力テーブルを TRUNCATE します）。</div>
      </div>
      <div class="actions">
        <button class="ghost" id="c-test">接続テスト（読み取り）</button>
        <button class="ghost" id="c-save">config.yaml に保存</button>
      </div>
      <div class="checks" id="c-checks"></div>
      <div class="toast" id="c-toast"></div>
    </div>
  </details>

  <!-- ② 検証実行 -->
  <div class="panel">
    <div class="panel-head">
      <h2>検証実行</h2>
    </div>
    <div class="panel-body">
      <!-- 検証定義は config の definition_file が正本 — 画面では列挙しない(ボタン+モニタ+結果)。
           読み込めない時だけ警告を出す(設定不備の検知)。 -->
      <div class="def-preview bad" id="def-preview" {% if definition.ok %}style="display:none"{% endif %}>
        <div class="def-head">検証定義が読み込めません</div>
        <div class="def-note" id="def-msg">{{ definition.message }} 「設定 / 接続」または <code>config.yaml</code> の <code>definition_file</code> を確認してください。</div>
      </div>
      <div class="grid">
        <div class="field"><label class="lab">設定ファイル <span class="opt">(config.yaml)</span></label><input type="text" id="config" value="{{ default_config }}"></div>
        <div class="field"><label class="lab">シェル指定 <span class="opt">(任意 · 例: 1-10 / 007)</span></label><input type="text" id="shells" placeholder="全件"></div>
      </div>
      <div class="actions">
        <button class="run big" id="run">▶ 検証実行</button>
        <button class="ghost" id="preflight">✓ 事前点検</button>
        <button class="ghost" id="evidence">⬇ 試験成績書(Excel)</button>
        <label class="chk"><input type="checkbox" id="verbose"> 差分を全件表示</label>
      </div>
      <div class="checks" id="preflight-out"></div>
    </div>
  </div>

  <!-- 共通: バナー / サマリー / 結果 -->
  <div id="banner" class="banner err"></div>
  <div id="warnbar" class="banner warn"></div>

  <div id="summary" class="panel">
    <div class="panel-head">
      <h2>検証サマリー</h2>
      <span class="sub" id="s-verdict"></span>
    </div>
    <div class="panel-body">
      <div class="summary-cards">
        <div class="scard total" data-f="*"><div class="n" id="s-total">0</div><div class="l">合計</div></div>
        <div class="scard ok" data-f="OK"><div class="n" id="s-ok">0</div><div class="l">OK</div></div>
        <div class="scard ng" data-f="NG"><div class="n" id="s-ng">0</div><div class="l">NG</div></div>
        <div class="scard err" data-f="ERROR"><div class="n" id="s-err">0</div><div class="l">ERROR</div></div>
        <div class="scard miss" data-f="MISSING_TOBE,MISSING_ASIS"><div class="n" id="s-miss">0</div><div class="l">MISSING</div></div>
      </div>
      <div class="filter-hint" id="filter-hint"></div>
      <div class="summary-meta">
        <span>所要 <span class="el" id="s-elapsed">0</span> 秒</span>
        <span class="rep" id="report"></span>
      </div>
    </div>
  </div>

  <div id="results-wrap">
    <div class="results-head">
      <h3>検証結果</h3>
      <span class="live" id="live"><span class="pulse"></span>実行中…</span>
    </div>
    <div id="results"></div>
    <div class="empty" id="filter-empty" style="display:none">該当する結果がありません</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
function scrollToEl(id, block){ const el=$(id); if(el) el.scrollIntoView({behavior:"smooth", block:block||"start"}); }
const STEP_ORDER = ["load","run","compare"];
let verboseFlag = false;
let running = false;
let es = null;                       // SSE ハンドル
let lastConfig = "{{ default_config }}";

/* ───────── 定義の読み込み状態（列挙はしない · 失敗時のみ警告） ───────── */
const DEF = {{ definition | tojson }};

/* ───────── 設定: 永続化 + フォーム ───────── */
const CONN_FIELDS = ["c-host","c-port","c-dbname","c-user","c-pwenv","c-encoding","config"];
function saveLocal(){
  const o={}; for (const id of CONN_FIELDS) o[id]=$(id).value;
  try { localStorage.setItem("dc_conn", JSON.stringify(o)); } catch(e){}
}
function restoreLocal(){
  let o; try { o=JSON.parse(localStorage.getItem("dc_conn")||"{}"); } catch(e){ o={}; }
  for (const id of CONN_FIELDS) if (o[id]!==undefined && o[id]!=="") $(id).value=o[id];
}
function toast(id,msg,ok){ const t=$(id); t.textContent=msg; t.className="toast "+(ok?"ok":"bad"); t.style.display="block"; }
function connForm(){
  // 접속 테스트·저장은 DB 접속 정보만 필요.
  const fd=new FormData();
  fd.append("host",$("c-host").value);
  fd.append("port",$("c-port").value);
  fd.append("dbname",$("c-dbname").value);
  fd.append("user",$("c-user").value);
  fd.append("password_env",$("c-pwenv").value);
  fd.append("encoding",$("c-encoding").value);
  fd.append("config",$("config").value);
  return fd;
}

/* ───────── 接続テスト（実 /connection/test, 読み取り専用） ───────── */
$("c-test").addEventListener("click", async () => {
  saveLocal();
  const btn=$("c-test"); btn.disabled=true; btn.classList.add("busy"); btn.textContent="接続中…";
  $("c-toast").style.display="none";
  const cont=$("c-checks"); cont.classList.add("show");
  cont.innerHTML=`<div class="ck-title">接続結果（読み取り専用）</div>`+
    `<div class="c pend"><span class="mk">…</span><span class="nm">確認中…</span><span class="dt"></span></div>`;
  try{
    const resp=await fetch("/connection/test",{method:"POST",body:connForm()});
    const r=await resp.json();
    const rows=(r.checks||[]).map(c=>
      `<div class="c ${c.ok?"ok":"bad"}"><span class="mk">${c.ok?"✓":"✗"}</span>`+
      `<span class="nm">${escapeHtml(c.name)}</span>`+
      `<span class="dt">${escapeHtml(c.detail||(c.ok?"OK":""))}</span></div>`).join("");
    const tnote = (r.tables && r.tables.length)
      ? `<div class="c ok"><span class="mk">✓</span><span class="nm">検出テーブル</span><span class="dt">${r.tables.length} 件</span></div>` : "";
    cont.innerHTML=`<div class="ck-title">接続結果（読み取り専用）</div>`+
      (rows+tnote || `<div class="c bad"><span class="mk">✗</span><span class="nm">確認できませんでした</span><span class="dt"></span></div>`);
    toast("c-toast", r.message || (r.ok?"接続成功":"接続失敗"), !!r.ok);
  }catch(err){ toast("c-toast","通信エラー: "+err,false); }
  finally{ btn.disabled=false; btn.classList.remove("busy"); btn.textContent="接続テスト（読み取り）"; }
});

/* ───────── 保存（実 /connection/save, DB接続・encodingのみ） ───────── */
$("c-save").addEventListener("click", async () => {
  saveLocal();
  const btn=$("c-save"); btn.disabled=true; btn.textContent="保存中…";
  try{
    const resp=await fetch("/connection/save",{method:"POST",body:connForm()});
    const r=await resp.json();
    toast("c-toast", r.message, !!r.ok);
    if (r.ok) refreshDefPreview();   // 保存で定義ファイル経路が変わり得る → プレビュー更新
  }catch(err){ toast("c-toast","通信エラー: "+err,false); }
  finally{ btn.disabled=false; btn.textContent="config.yaml に保存"; }
});

// 設定保存後など、定義が読めるかだけ確認（読めれば警告を隠す、ダメなら理由表示）。
async function refreshDefPreview(){
  try{
    const r=await (await fetch("/definition/preview?config="+encodeURIComponent($("config").value))).json();
    DEF.ok=r.ok; DEF.message=r.message;
    const pv=$("def-preview"); if(!pv) return;
    if (r.ok){ pv.style.display="none"; }
    else { pv.style.display=""; const m=$("def-msg"); if(m) m.textContent=(r.message||"")+" 「設定 / 接続」または config.yaml の definition_file を確認してください。"; }
  }catch(e){ /* 補助情報 — 失敗しても実行は可能 */ }
}

/* ───────── 結果レンダリング（イベント駆動） ───────── */
function reset(){
  $("results").innerHTML="";
  $("summary").classList.remove("show");
  $("banner").classList.remove("show");
  $("warnbar").classList.remove("show");
  $("results-wrap").classList.remove("show");
  activeFilter=null;
  document.querySelectorAll('.scard').forEach(c=>c.classList.remove('active','disabled'));
  $("filter-empty").style.display="none";
  $("filter-hint").innerHTML="";
}
function showBanner(id, html){ const b=$(id); b.innerHTML=`<div>${html}</div>`; b.classList.add("show"); }

/* ───────── カードクリックフィルタ（出力単位） ───────── */
let activeFilter=null;
function applyFilter(){
  const want = activeFilter ? activeFilter.split(",") : null;
  let shown=0;
  document.querySelectorAll('#results .shell').forEach(shell=>{
    const rows = shell.querySelectorAll('.outrow');
    let anyVisible=false;
    rows.forEach(o=>{
      const show = !want || want.includes(o.dataset.status||"");
      o.style.display = show ? "" : "none";
      if(show){ anyVisible=true; shown++; }
    });
    shell.style.display = (rows.length===0 || anyVisible) ? "" : "none";
  });
  $("filter-empty").style.display = (activeFilter && shown===0) ? "block" : "none";
  updateFilterHint();
}
function updateFilterHint(){
  const h=$("filter-hint");
  if(!activeFilter){ h.innerHTML=""; return; }
  const label = activeFilter.indexOf("MISSING")===0 ? "MISSING" : activeFilter;
  h.innerHTML = `<b>${label}</b> で絞り込み中 <a id="filter-clear">解除（全件表示）</a>`;
  $("filter-clear").onclick=()=>setFilter(null);
}
function updateCardHighlight(){
  document.querySelectorAll('.scard').forEach(c=>{
    const f=c.getAttribute('data-f');
    const on=(activeFilter===null && f==="*")||(activeFilter!==null && f===activeFilter);
    c.classList.toggle('active', on);
  });
}
function setFilter(f){
  activeFilter = (f && activeFilter===f) ? null : f;
  updateCardHighlight();
  applyFilter();
}
function setupCardFilters(s){
  const counts={ "OK":s.ok_count, "NG":s.ng_count, "ERROR":s.error_count, "MISSING_TOBE,MISSING_ASIS":s.missing_count };
  document.querySelectorAll('.scard').forEach(c=>{
    const f=c.getAttribute('data-f');
    if(f==="*"){ c.classList.remove('disabled'); return; }
    c.classList.toggle('disabled', (counts[f]||0)===0);
  });
  activeFilter=null; updateCardHighlight(); applyFilter();
}

function shellRow(id,index,total){
  const el=document.createElement("div");
  el.className="shell running"; el.id="shell-"+id; el.dataset.status="RUN";
  el.innerHTML=
    `<div class="shell-head">
       <span class="ix">[${index}/${total}]</span>
       <span class="sid">${escapeHtml(id)}</span>
       <span class="badge b-RUN" id="badge-${id}"><span class="bd"></span>処理中</span>
     </div>
     <div class="steps" id="steps-${id}">
       <span class="step" data-step="load"><span class="sdot"></span>入力ロード <span class="res"></span></span>
       <span class="connector" data-conn="0"></span>
       <span class="step" data-step="run"><span class="sdot"></span>バッチ実行 <span class="res"></span></span>
       <span class="connector" data-conn="1"></span>
       <span class="step" data-step="compare"><span class="sdot"></span>結果比較 <span class="res"></span></span>
     </div>
     <div class="outs" id="outs-${id}"></div>`;   // T7-2: 출력별 결과 블록
  $("results").appendChild(el);
  return el;
}
function setStepActive(id,step){
  const row=$("shell-"+id); if(!row) return;
  const s=row.querySelector(`[data-step="${step}"]`);
  if(s){ s.classList.remove("done","err"); s.classList.add("active"); s.querySelector(".res").textContent=""; }
}
function setStepResult(id,step,status){
  const row=$("shell-"+id); if(!row) return;
  const s=row.querySelector(`[data-step="${step}"]`);
  if(!s) return;
  s.classList.remove("active");
  const ok = status==="OK";
  s.classList.add(ok?"done":"err");
  s.querySelector(".res").textContent = "→ "+status;
  const idx=STEP_ORDER.indexOf(step);
  if(idx<2 && ok){ const c=row.querySelector(`[data-conn="${idx}"]`); if(c) c.classList.add("fill"); }
}
function setBadge(id,status,label){
  const b=$("badge-"+id); if(!b) return;
  b.className="badge b-"+status;
  b.innerHTML=`<span class="bd"></span>${label||status}`;
}
function finishRow(id){ const row=$("shell-"+id); if(row) row.classList.remove("running"); }

function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
// As-Is/To-Be の共通前後を除いた「変化区間」だけ <mark> で囲む（文字単位）。
function diffMark(a,b){
  a=String(a); b=String(b);
  let s=0; const n=Math.min(a.length,b.length);
  while(s<n && a[s]===b[s]) s++;
  let ea=a.length, eb=b.length;
  while(ea>s && eb>s && a[ea-1]===b[eb-1]){ ea--; eb--; }
  const wrap=(t,cls)=> t? `<mark class="${cls}">${escapeHtml(t)}</mark>` : "";
  return [
    escapeHtml(a.slice(0,s))+wrap(a.slice(s,ea),"a")+escapeHtml(a.slice(ea)),
    escapeHtml(b.slice(0,s))+wrap(b.slice(s,eb),"b")+escapeHtml(b.slice(eb)),
  ];
}
const DIFF_CAP = 200;   // 셸당 화면 표시 상한(대량 NG에서 DOM 폭증 방지). 체크 시 해제.
function diffHtml(diff_lines){
  diff_lines = diff_lines || [];
  const lines = verboseFlag ? diff_lines : diff_lines.slice(0, DIFF_CAP);
  const html = lines.map(d=>{
    const [a,b]=diffMark(d.asis_content,d.tobe_content);
    return `<div class="dline">
       <div class="ln">${d.line_number} 行目</div>
       <div class="row asis"><span class="tag">As-Is</span><span>${a}</span></div>
       <div class="row tobe"><span class="tag">To-Be</span><span>${b}</span></div>
     </div>`;
  }).join("");
  const more = (!verboseFlag && diff_lines.length>DIFF_CAP)
    ? `<div class="more">ほか ${diff_lines.length-DIFF_CAP} 行（「上限なしで全件表示」または レポート/.diff で確認）</div>` : "";
  return html+more;
}
const _MISS_MSG = { "MISSING_TOBE":"To-Be 出力がありません（新環境バッチが結果を生成しませんでした）",
                    "MISSING_ASIS":"As-Is 正解CSVがありません（対応する正解ファイルが見つかりません）" };
// 출력 1건 결과를 셸 안에 블록으로 추가(다중 출력이면 N개 누적). data-status로 카드 필터.
function appendOutput(shell, r){
  const cont=$("outs-"+shell); if(!cont) return;
  const block=document.createElement("div");
  block.className="outrow"; block.dataset.status=r.status;
  const label = r.output_name ? `<span class="outname">${escapeHtml(r.output_name)}</span>` : "";
  block.innerHTML = `<div class="outhead">${label}<span class="badge b-${r.status}"><span class="bd"></span>${r.status}</span></div>`;
  if (r.status==="NG"){
    block.innerHTML += `<div class="detail show" style="margin:7px 0 0">${diffHtml(r.diff_lines)}</div>`;
  } else if (r.status==="MISSING_TOBE" || r.status==="MISSING_ASIS"){
    block.innerHTML += `<div class="detail show" style="margin:7px 0 0"><div class="errbox">${escapeHtml(_MISS_MSG[r.status])}</div></div>`;
  } else if (r.status==="ERROR"){
    block.innerHTML += `<div class="detail show" style="margin:7px 0 0"><div class="errbox">${escapeHtml("エラー: "+(r.error_message||""))}</div></div>`;
  }
  cont.appendChild(block);
}
// 셸 헤더 배지 = 출력들의 worst(OK 아닌 게 있으면 그 상태).
const _STATUS_PRIO = ["ERROR","MISSING_TOBE","MISSING_ASIS","NG","OK"];
function shellAgg(shell){
  const got=new Set([...$("outs-"+shell).querySelectorAll(".outrow")].map(o=>o.dataset.status));
  for (const s of _STATUS_PRIO) if (got.has(s)) return s;
  return "OK";
}

// 진행 이벤트: 단계 점등은 step 이벤트가, 출력별 결과는 shell_done(출력마다)이 구동한다.
function onProgress(m){
  if (m.kind==="shell_start"){
    shellRow(m.shell_id, m.index, m.total);
    setStepActive(m.shell_id,"load");
  } else if (m.kind==="step"){
    const st=m.step_status;
    if (m.step==="load"){ setStepResult(m.shell_id,"load",st); if(st==="OK") setStepActive(m.shell_id,"run"); }
    else if (m.step==="run"){ setStepResult(m.shell_id,"run",st); if(st==="OK") setStepActive(m.shell_id,"compare"); }
    else if (m.step==="compare"){ setStepResult(m.shell_id,"compare",st); }
  } else if (m.kind==="shell_done"){
    renderDone(m.result);
  }
}
function renderDone(r){
  appendOutput(r.shell_id, r);
  setBadge(r.shell_id, shellAgg(r.shell_id));
  finishRow(r.shell_id);
  applyFilter();
}

function renderSummary(s){
  $("s-total").textContent=s.total;
  $("s-ok").textContent=s.ok_count;
  $("s-ng").textContent=s.ng_count;
  $("s-err").textContent=s.error_count;
  $("s-miss").textContent=s.missing_count;
  $("s-elapsed").textContent=Number(s.elapsed_seconds).toFixed(1);
  const bad=s.ng_count+s.error_count+s.missing_count;
  const verdict=$("s-verdict");
  if (bad===0){ verdict.textContent="全件一致"; verdict.style.color="var(--ok)"; }
  else { verdict.textContent=`要確認 — NG/ERROR/MISSING ${bad} 件`; verdict.style.color="var(--ng)"; }
  const cfg=encodeURIComponent(lastConfig);
  $("report").innerHTML=`レポート: <a href="/report/${encodeURIComponent(s.report_name)}?config=${cfg}">${escapeHtml(s.report_name)}</a>`;
  $("summary").classList.add("show");
  setupCardFilters(s);
  scrollToEl("summary", "center");
}

function handleMsg(m){
  if (m.type==="progress") onProgress(m);
  else if (m.type==="summary"){ $("live").classList.remove("show"); renderSummary(m); }
  else if (m.type==="warning") showBanner("warnbar", escapeHtml(m.message));
  else if (m.type==="error") showBanner("banner", escapeHtml(m.message));
}
function setRunning(on){ running=on; $("run").disabled=on; }

/* ───────── 検証実行（実 /run, SSE） ───────── */
function finishRun(){ if(es){ es.close(); es=null; } $("live").classList.remove("show"); setRunning(false); }
$("run").addEventListener("click", () => {
  if (running) return;
  reset(); setRunning(true);
  verboseFlag=$("verbose").checked; lastConfig=$("config").value; saveLocal();
  $("results-wrap").classList.add("show"); $("live").classList.add("show");
  scrollToEl("results-wrap", "start");
  const params=new URLSearchParams();
  params.set("config",$("config").value);
  if ($("shells").value.trim()) params.set("shells",$("shells").value.trim());
  es=new EventSource("/run?"+params.toString());
  es.onmessage=(e)=>{ const m=JSON.parse(e.data); if(m.type==="done") finishRun(); else handleMsg(m); };
  es.onerror=()=> finishRun();
});

/* ───────── 事前点検 (C3 /preflight) ───────── */
function renderPreflight(d){
  const box=$("preflight-out"); box.innerHTML="";
  const line=(cls,label,i)=>`<div class="${cls}">${label} [${escapeHtml(i.coordinate)}] ${escapeHtml(i.message)}</div>`;
  let html="";
  for (const i of (d.errors||[])) html+=line("bad","✖",i);
  for (const i of (d.warnings||[])) html+=line("warn","▲",i);
  if (d.ok && !(d.warnings||[]).length) html=`<div class="ok">✓ 事前点検 通過 — 実行可</div>`;
  else if (d.ok) html=`<div class="warn">▲ 警告あり（${d.warnings.length}件） — 実行可</div>`+html;
  else html=`<div class="bad">✖ 拒否 — エラー ${d.errors.length}件。修正してください</div>`+html;
  box.innerHTML=html;
}
$("preflight").addEventListener("click", async () => {
  const btn=$("preflight"); btn.disabled=true; const old=btn.textContent; btn.textContent="点検中…";
  try {
    const r=await fetch("/preflight?config="+encodeURIComponent($("config").value));
    renderPreflight(await r.json());
  } catch(e){ showBanner("banner","事前点検に失敗: "+e); }
  finally { btn.disabled=false; btn.textContent=old; }
});
$("evidence").addEventListener("click", () => {
  window.location="/evidence?config="+encodeURIComponent($("config").value);
});

/* ───────── 初期化 ───────── */
restoreLocal();
for (const id of CONN_FIELDS) $(id).addEventListener("change", saveLocal);
for (const c of document.querySelectorAll('.scard')) c.addEventListener("click", () => {
  if (c.classList.contains("disabled")) return;
  const f=c.getAttribute("data-f");
  setFilter(f==="*" ? null : f);
});
</script>
</body>
</html>
