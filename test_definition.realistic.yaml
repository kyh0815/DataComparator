# ============================================================================
#  test_definition.realistic.yaml — 현실형(풀스키마) 정의 샘플
#  실 운영 형태: 한 셸(잡)이 **여러 입력**을 읽고 **파일·DB로 동시 출력**.
#  규격 정본 docs/DEFINITION_SPEC.md · 결정 D-033/D-036 · 환경 docs/REALISTIC_TEST.md
#
#  실행: PGPORT=5433 POSTGRES_PASSWORD=devpw ./run_realistic.sh
#  (필드명은 실제 로더 기준: test_id / execution.shell_program / input.tables[] / csv)
# ============================================================================

tests:

  # ── R01. 日次決済バッチ ───────────────────────────────────────────────────
  #  다중 입력(거래 테이블 + 고객 마스터) → 다중 출력(파일 明細 + DB 集計).
  #  한 번의 배치 실행이 파일과 DB 두 곳에 동시 출력 → 결과 2건(출력 단위 집계).
  - test_id: "R01"
    test_name: "日次決済バッチ（複数入力 → ファイル＋DB出力）"
    input:
      type: database
      tables:
        - { csv: 取引明細.csv,  type: database, table: rt_transaction }  # #2/#3/#7-1
        - { csv: 顧客マスタ.csv, type: database, table: rt_customer }    # 조인용 마스터(다중 입력)
    execution: { shell_program: stub_batch/run_settlement.py, timeout: 120 }  # #8
    outputs:
      # 파일 출력: 거래明細(조인 결과)을 그대로 비교
      - { type: file,     file: 決済明細.csv,   expected: 決済明細_正解.csv,   name: 明細 }   # #9/#10/#5
      # DB 출력: 고객별 集計 테이블을 CSV export해 비교
      - { type: database, table: rt_summary, export_as: 顧客別集計.csv, expected: 顧客別集計_正解.csv, name: 集計 }

  # ── R02. 夜間取引取込（項目別パス override 시연, D-036）────────────────────
  #  파일 입력(夜間取引) + 고객 마스터(DB) → 파일 출력. 입력/출력 경로를
  #  항목별로 다른 위치(night/ 하위)로 지정 → config 공통 디렉토리를 override.
  - test_id: "R02"
    test_name: "夜間取引取込（ファイル入力・項目別パス）"
    input:
      type: file
      tables:
        - csv: 夜間取引.csv                       # #2
          type: file                              # #3
          src_dir:   ./samples/realistic/asis/input/night    # #4  As-Is 입력 격납 패스(override)
          dest_dir:  ./out/realistic/tobe_input/night        # #7-4 To-Be 적재 패스(override)
          dest_name: staged_夜間取引.csv                      # #7-3 To-Be 적재 파일명(override)
        - { csv: 顧客マスタ.csv, type: database, table: rt_customer }  # 조인용 마스터
    execution: { shell_program: stub_batch/run_settlement.py, timeout: 120 }
    outputs:
      - type: file
        file: 夜間明細.csv                         # #9
        expected: 夜間明細_正解.csv                 # #5
        name: 夜間明細
        expected_dir: ./samples/realistic/asis/output/night  # #7  정답 격납 패스(override)
        tobe_dir:     ./out/realistic/tobe_output/night      # #11 To-Be 출력 격납 패스(override)
